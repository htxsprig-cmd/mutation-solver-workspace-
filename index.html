<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mutation Solver Workspace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Mutation lookup workspace</p>
        <h1>Paste a mutation name or ID</h1>
        <p class="subtitle">
          Enter one or more mutation names or identifiers and receive a mapped suggestion for follow-up care.
        </p>
      </header>

      <section class="panel">
        <label for="mutationInput">Mutation names or IDs</label>
        <textarea id="mutationInput" placeholder="
Here is a list of available example mutations you can type into the input field:

EGFR L858R
BRAF V600E
KRAS G12C
KRAS G12D
BRCA1
BRCA2
ALK fusion
ROS1 fusion
RET fusion
NTRK fusion
MET exon 14 skipping
ERBB2 (HER2) amplification
PIK3CA E545K
PTEN loss
TP53 mutation
MSI-H / MMR deficiency
IDH1 R132H
IDH2 R140Q
JAK2 V617F
BCR-ABL1
FLT3-ITD"></textarea>
        <div class="actions">
          <button id="lookupBtn">Look up</button>
          <button id="clearBtn" class="secondary">Clear</button>
        </div>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <h2>Results</h2>
          <p>Demo data only — confirm any clinical direction with a qualified specialist.</p>
        </div>
        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
